<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(주)비에이텍 | 문서 뷰어</title>
    <meta name="description" content="비에이텍 기술 자료 및 인증서 뷰어입니다.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- PageFlip -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepblue: '#1A365D',
                        skyblue: '#63B3ED',
                    },
                    fontFamily: {
                        sans: ['Noto Sans KR', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .gradient-bg {
            background: radial-gradient(circle at top right, #1A365D 0%, #0A192F 100%);
        }
        #book {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .page-content {
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 100%;
            height: 100%;
            background-color: white;
        }
        .page.hard {
            background-color: #1A365D;
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-slate-800 font-sans overflow-x-hidden">
    <!-- Passing pdfUrl from Spring Boot Controller to JS -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        window.targetPdfUrl = /*[[${pdfUrl}]]*/ null;
        window.targetFileName = /*[[${fileName}]]*/ 'Document';
        /*]]>*/
    </script>

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="glass-panel rounded-[2rem] p-8 mb-12 flex flex-col md:flex-row items-center justify-between shadow-2xl">
            <div class="flex items-center gap-4 mb-4 md:mb-0">
                <div class="w-12 h-12 bg-deepblue rounded-xl flex items-center justify-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-droplets"><path d="M7 16.3c2.2 0 4-1.8 4-4 0-.9-.3-1.7-.8-2.3L7 5.2 3.8 10c-.5.6-.8 1.4-.8 2.3 0 2.2 1.8 4 4 4Z"/><path d="M17 20.8c2.2 0 4-1.8 4-4 0-.9-.3-1.7-.8-2.3L17 9.7l-3.2 4.8c-.5.6-.8 1.4-.8 2.3 0 2.2 1.8 4 4 4Z"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-deepblue tracking-tight">(주)비에이텍 문서 뷰어</h1>
                    <p id="file-title" class="text-slate-500 font-medium">문서를 불러오는 중...</p>
                </div>
            </div>
            
            <a href="/index.html" class="px-6 py-3 bg-skyblue/10 text-deepblue rounded-full font-bold hover:bg-skyblue hover:text-white transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                홈으로 돌아가기
            </a>
        </header>

        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="w-16 h-16 border-4 border-skyblue border-t-transparent rounded-full animate-spin mb-6"></div>
            <p id="loading-text" class="text-white text-lg font-bold">PDF 문서를 렌더링하고 있습니다...</p>
            <div class="w-64 h-2 bg-white/10 rounded-full mt-6 overflow-hidden">
                <div id="progress" class="h-full bg-skyblue transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <main id="book-area" class="hidden flex flex-col items-center animate-fade-in">
            <div class="book-controls glass-panel rounded-full px-8 py-4 mb-10 flex items-center gap-8 shadow-xl">
                <button id="prev-btn" class="p-2 text-deepblue hover:text-skyblue transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <span id="page-info" class="text-deepblue font-black min-w-[120px] text-center">Page 1 of ?</span>
                <button id="next-btn" class="p-2 text-deepblue hover:text-skyblue transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
            
            <div class="relative w-full flex justify-center pb-20">
                <div id="book" class="bg-white">
                    <!-- Pages go here -->
                </div>
            </div>
        </main>
    </div>

    <script src="./script.js"></script>
</body>
</html>
